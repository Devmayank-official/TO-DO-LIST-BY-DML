name: dml_hub
description: DML Hub Android-first productivity platform.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.7
  drift: ^2.18.0
  drift_flutter: ^0.2.1
  sqlite3_flutter_libs: ^0.5.24
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  dartz: ^0.10.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_local_notifications: ^17.2.2
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.2.0
  talker_flutter: ^4.4.1
  talker_riverpod_logger: ^4.4.1
  intl: ^0.19.0
  uuid: ^4.4.0
  get_it: ^7.7.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  drift_dev: ^2.18.0
  freezed: ^2.5.2
